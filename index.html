<!DOCTYPE html>
<html>
<head>
  <title>Quest Planner Engine</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="step1" class="layer active">
  <h2>Mode</h2>
  <button onclick="setMode(1); nextStep(1,2)">Casual</button>
  <button onclick="setMode(2); nextStep(1,2)">Rank</button>
</div>

<div id="step2" class="layer">
  <h2>Mood</h2>
  <button onclick="setMood(1); nextStep(2,3)">Awful</button>
  <button onclick="setMood(2); nextStep(2,3)">Neutral</button>
  <button onclick="setMood(3); nextStep(2,3)">Great</button>
</div>

<div id="step3" class="layer">
  <h2>Kondisi</h2>
  <button onclick="setKondisi(1); nextStep(3,4)">Work</button>
  <button onclick="setKondisi(2); nextStep(3,4)">Freetime</button>
</div>

<div id="step4" class="layer">
  <h2>Aktivitas</h2>
  <button onclick="setAktivitas(1); nextStep(4,5)">Lowest</button>
  <button onclick="setAktivitas(2); nextStep(4,5)">Low</button>
  <button onclick="setAktivitas(3); nextStep(4,5)">Mid</button>
  <button onclick="setAktivitas(4); nextStep(4,5)">High</button>
  <button onclick="setAktivitas(5); nextStep(4,5)">Highest</button>
</div>

<div id="step5" class="layer">
  <h2>Hasil</h2>
  <h3 id="daily"></h3>
  <img id="diffImage" style="width:150px; margin-top:10px;">
  <p id="reason"></p>
  <h3 id="weekly"></h3>
</div>

<script src="script.js"></script>
</body>
</html>
